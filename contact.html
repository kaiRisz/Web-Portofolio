<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <title>Portofolio Kai</title>
</head>

<script>
const form = document.querySelector("form");
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const messageInput = document.getElementById("message");

form.addEventListener("submit", function(e){
    e.preventDefault();

    let valid = true;

    if(nameInput.value.trim() === ""){
        alert("Name tidak boleh kosong");
        valid = false;
    }

    if(!emailInput.value.includes("@")){
        alert("Email tidak valid");
        valid = false;
    }

    if(messageInput.value.trim().length < 10){
        alert("Message minimal 10 karakter");
        valid = false;
    }

    if(valid){
        alert("Pesan berhasil dikirim!");
        form.reset();
    }
});

const navLinks = document.querySelectorAll("nav a");

navLinks.forEach(link => {
    link.addEventListener("mouseover", () => {
        link.style.color = "#00A8FF";
    });

    link.addEventListener("mouseout", () => {
        link.style.color = "#E2E8F0";
    });
});
</script>

<body>

    <header>
         <img src="images/logo-kai.png" alt="logo-kai" width="200px">

         <nav id="navbar">
            <a href="index.html" class="nav-active" >Home</a>
            <a href="about.html" >About</a>
            <a href="project.html">Project</a>
            <a href="contact.html">Contact</a>
            <a href="blog.html">Blog</a>
         </nav>
    </header>

    <main>

        <section class="contact">
            <h1 id="contact">Contact Me</h1>
            <p>Feel free to reach out if you have any questions or want to collab with me!</p>
            
            <div class="card-form">
                <form action="">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label> 
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" required></textarea>
                    </div><br>

                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>
        </section> 

    </main>

    <footer>
        <p>© 2026 Khaila Noverisya Nurdi. All rights reserved.</p>
    </footer>

    <script>
    document.addEventListener("DOMContentLoaded", function(){

        const links = document.querySelectorAll("#navbar a");
        let currentPage = window.location.pathname.split("/").pop();

        if(currentPage === ""){
            currentPage = "index.html";
        }

        links.forEach(link => {
            const linkPage = link.getAttribute("href");

            if(linkPage === currentPage){
                link.classList.add("nav-active");
            } else {
                link.classList.remove("nav-active");
            }
        });

    });
    </script>
    
</body>
</html>
